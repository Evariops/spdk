# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# ------------------------------------------------------------------
# SPDK Debug Image — Build, Scan, Sign, Publish
# ------------------------------------------------------------------
# Debug variant of SPDK: Fedora-based image with --enable-debug,
# unstripped symbols, and runtime tooling (gdb, strace, perf,
# nvme-cli, RPC scripts) for interactive debugging.
#
# Tag convention:  spdk/v26.01.0  →  v26.01.0 (same tag as prod)
# Registry:        ghcr.io/evariops/spdk-debug
# ------------------------------------------------------------------
name: SPDK Debug

on:
  push:
    branches: [main]
    tags: ["spdk/v*"]
    paths:
      - "images/spdk/**"
      - "module/bdev/cbt/**"
      - "patches/**"
      - ".github/workflows/spdk-debug.yml"
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "images/spdk/**"
      - "module/bdev/cbt/**"
      - "patches/**"
      - ".github/workflows/spdk-debug.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/evariops/spdk-debug

# ── Top-level permissions (least-privilege baseline) ─────────────
permissions:
  contents: read

# ── Cancel superseded runs on the same branch / PR ──────────────
concurrency:
  group: spdk-debug-${{ github.ref }}
  cancel-in-progress: true

# ==================================================================
jobs:
  # ────────────────────────────────────────────────────────────────
  # 0. Gate — only authorized actors can trigger PR image builds
  # ────────────────────────────────────────────────────────────────
  authorize:
    name: Authorize
    runs-on: ubuntu-24.04
    if: >-
      github.event_name != 'pull_request'
      || (
        contains(github.event.pull_request.labels.*.name, 'build-images')
        && contains(fromJSON('["rducom","renovate[bot]"]'), github.actor)
      )
    steps:
      - run: echo "✓ Authorized"

  # ────────────────────────────────────────────────────────────────
  # 1. Lint
  # ────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/spdk/Dockerfile
          config: images/spdk/.hadolint.yaml

  # ────────────────────────────────────────────────────────────────
  # 2. Build SPDK debug — amd64 (native runner)
  # ────────────────────────────────────────────────────────────────
  build-amd64:
    needs: [authorize, lint]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      imageid: ${{ steps.build.outputs.imageid }}
      tag: ${{ steps.tag.outputs.tag }}
      minor_tag: ${{ steps.tag.outputs.minor_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag suffix
        id: tag
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          VERSION=$(sed -n 's/^ARG SPDK_VERSION=\(v[^ ]*\)/\1/p' images/spdk/Dockerfile)
          if [[ "$GITHUB_REF" == refs/tags/spdk/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/spdk/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "minor_tag=${TAG%.*}" >> "$GITHUB_OUTPUT"
            fi
          elif [[ -n "${PR_NUMBER}" ]]; then
            SHORT_SHA=$(echo "${PR_HEAD_SHA}" | cut -c1-7)
            TAG="${VERSION}-pr${PR_NUMBER}-${SHORT_SHA}"
          else
            TAG="${VERSION}-sha-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build debug (amd64)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: images/spdk/Dockerfile
          target: debug
          platforms: linux/amd64
          build-args: BUILD_TYPE=debug
          push: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'pull_request' }}
          load: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}-amd64
          cache-from: type=gha,scope=spdk-debug-amd64
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,scope=spdk-debug-amd64,mode=max' || '' }}

      # ── Vulnerability scan (gate — before manifest merge) ─────
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) && steps.build.outputs.imageid || format('{0}:{1}-amd64', env.IMAGE_NAME, steps.tag.outputs.tag) }}
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"

  # ────────────────────────────────────────────────────────────────
  # 3. Build SPDK debug — arm64 (native ARM runner, NO QEMU)
  # ────────────────────────────────────────────────────────────────
  build-arm64:
    needs: [authorize, lint]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag suffix
        id: tag
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          VERSION=$(sed -n 's/^ARG SPDK_VERSION=\(v[^ ]*\)/\1/p' images/spdk/Dockerfile)
          if [[ "$GITHUB_REF" == refs/tags/spdk/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/spdk/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "minor_tag=${TAG%.*}" >> "$GITHUB_OUTPUT"
            fi
          elif [[ -n "${PR_NUMBER}" ]]; then
            SHORT_SHA=$(echo "${PR_HEAD_SHA}" | cut -c1-7)
            TAG="${VERSION}-pr${PR_NUMBER}-${SHORT_SHA}"
          else
            TAG="${VERSION}-sha-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build debug (arm64)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: images/spdk/Dockerfile
          target: debug
          platforms: linux/arm64
          build-args: BUILD_TYPE=debug
          push: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'pull_request' }}
          load: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}-arm64
          cache-from: type=gha,scope=spdk-debug-arm64
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,scope=spdk-debug-arm64,mode=max' || '' }}

      # ── Vulnerability scan (gate — before manifest merge) ─────
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) && steps.build.outputs.imageid || format('{0}:{1}-arm64', env.IMAGE_NAME, steps.tag.outputs.tag) }}
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"

  # ────────────────────────────────────────────────────────────────
  # 4a. PR publish — multi-arch manifest (no signing)
  # ────────────────────────────────────────────────────────────────
  publish-pr:
    needs: [build-amd64, build-arm64]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Create multi-arch manifest for PR
        env:
          TAG: ${{ needs.build-amd64.outputs.tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TAG}" \
            "${IMAGE_NAME}:${TAG}-amd64" \
            "${IMAGE_NAME}:${TAG}-arm64"
          echo "✓ Published: ${IMAGE_NAME}:${TAG}"

  # ────────────────────────────────────────────────────────────────
  # 4b. Release publish — multi-arch manifest + Sign + SBOM + Attest
  # ────────────────────────────────────────────────────────────────
  publish:
    needs: [build-amd64, build-arm64]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # cosign keyless (Fulcio OIDC)
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # ── Create multi-arch manifest ────────────────────────────
      - name: Create and push multi-arch manifest
        id: manifest
        env:
          TAG: ${{ needs.build-amd64.outputs.tag }}
          MINOR_TAG: ${{ needs.build-amd64.outputs.minor_tag }}
        run: |
          set -euo pipefail

          # Create versioned manifest from per-arch tags
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${TAG}" \
            "${IMAGE_NAME}:${TAG}-amd64" \
            "${IMAGE_NAME}:${TAG}-arm64"

          # Floating minor tag (e.g. v26.01 from v26.01.0)
          if [[ -n "${MINOR_TAG}" ]]; then
            docker buildx imagetools create \
              -t "${IMAGE_NAME}:${MINOR_TAG}" \
              "${IMAGE_NAME}:${TAG}-amd64" \
              "${IMAGE_NAME}:${TAG}-arm64"
          fi

          # If this is a release tag, also create sha tag
          if [[ "$GITHUB_REF" == refs/tags/spdk/v* ]]; then
            SHA_TAG="sha-${GITHUB_SHA::7}"
            docker buildx imagetools create \
              -t "${IMAGE_NAME}:${SHA_TAG}" \
              "${IMAGE_NAME}:${TAG}-amd64" \
              "${IMAGE_NAME}:${TAG}-arm64"
          fi

          # Retrieve the manifest digest
          DIGEST=$(docker buildx imagetools inspect "${IMAGE_NAME}:${TAG}" --raw | sha256sum | awk '{print "sha256:"$1}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: ${DIGEST}"

      # ── Cosign: install ───────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # ── Cosign: sign image (keyless via Fulcio OIDC) ──────────
      - name: Sign image
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_NAME}@${DIGEST}"

      # ── SBOM generation (SPDX) ───────────────────────────────
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 90

      # ── SBOM generation (CycloneDX) ──────────────────────────
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-artifact-retention: 90

      # ── Enrich SBOMs with source package metadata ─────────────
      - name: Checkout (for scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github/scripts
          path: repo

      - name: Enrich SBOMs
        env:
          TAG: ${{ needs.build-amd64.outputs.tag }}
        run: |
          VER="${TAG#v}"; VER="${VER%.*}"
          ./repo/.github/scripts/enrich-sbom.sh \
            --name spdk \
            --version "$VER" \
            --supplier "SPDK Project (Linux Foundation)" \
            --license "BSD-3-Clause" \
            --purl "pkg:github/spdk/spdk@v${VER}" \
            --download "https://github.com/spdk/spdk/archive/refs/tags/v${VER}.tar.gz" \
            --vcs "https://github.com/spdk/spdk" \
            --spdx sbom.spdx.json \
            --cdx sbom.cdx.json

      # ── Cosign: attest SBOMs on the image ─────────────────────
      - name: Attest SBOM
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_NAME}@${DIGEST}"
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${IMAGE_NAME}@${DIGEST}"
